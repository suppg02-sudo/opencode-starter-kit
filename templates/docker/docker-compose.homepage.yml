version: '3.8'

# Homepage - Server dashboard
# Port: ${PORT_HOMEPAGE:-3000}

services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "${PORT_HOMEPAGE:-3000}:3000"
    volumes:
      - homepage_config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
      - TZ=${TZ:-UTC}
    labels:
      - "com.opencode.managed=true"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  opencode:
    external: true

volumes:
  homepage_config:
