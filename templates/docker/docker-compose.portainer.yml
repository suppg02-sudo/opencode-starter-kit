version: '3.8'

# Portainer - Container management UI
# Ports: 9443 (HTTPS), 9000 (HTTP)

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "${PORT_PORTAINER_HTTPS:-9443}:9443"
      - "${PORT_PORTAINER_HTTP:-9000}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    environment:
      - TZ=${TZ:-UTC}
    labels:
      - "com.opencode.managed=true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  opencode:
    external: true

volumes:
  portainer_data:
