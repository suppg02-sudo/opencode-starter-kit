version: '3.8'

# Hugo Static Site Generator
# Port: ${PORT_HUGO:-1313}

services:
  hugo:
    image: hugomods/hugo:exts
    container_name: hugo
    restart: unless-stopped
    ports:
      - "${PORT_HUGO:-1313}:1313"
    volumes:
      - hugo_content:/src/content
      - hugo_public:/src/public
      - hugo_themes:/src/themes
    command: server --buildDrafts --bind 0.0.0.0 --baseURL http://${SERVER_HOST:-localhost}:${PORT_HUGO:-1313}/
    working_dir: /src
    environment:
      - HUGO_ENV=production
      - TZ=${TZ:-UTC}
    labels:
      - "com.opencode.managed=true"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:1313/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  opencode:
    external: true

volumes:
  hugo_content:
  hugo_public:
  hugo_themes:
