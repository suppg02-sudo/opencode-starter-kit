version: '3.8'

# NextExplorer - Modern file browser
# Port: ${PORT_NEXTEXPLORER:-8080}

services:
  nextexplorer:
    image: nxzai/explorer:latest
    container_name: nextexplorer
    restart: unless-stopped
    ports:
      - "${PORT_NEXTEXPLORER:-8080}:3000"
    environment:
      - TZ=${TZ:-UTC}
      - APP_URL=http://${SERVER_HOST:-localhost}:${PORT_NEXTEXPLORER:-8080}
      - AUTH_MODE=${NEXTEXPLORER_AUTH:-disabled}
    volumes:
      - nextexplorer_config:/config
      - nextexplorer_cache:/cache
      # Mount paths - customize as needed
      - ${OPENCODE_CONFIG_PATH:-~/.config/opencode}:/mnt/opencode:rw
      - ${OPENCODE_SKILLS_PATH:-~/.config/opencode/skills}:/mnt/skills:rw
    labels:
      - "com.opencode.managed=true"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  opencode:
    external: true

volumes:
  nextexplorer_config:
  nextexplorer_cache:
